databases:
  - name: mineblock-db
    plan: basic_256mb
    databaseName: mineblock
    user: mineblock_user

services:
  - type: web
    name: mineblock-admin
    runtime: node
    plan: starter
    buildCommand: npm install && npx playwright install chromium && cd client && npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mineblock-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://mineblock-dashboard.onrender.com
      - key: REDIS_URL
        value: ""
      - key: ANTHROPIC_API_KEY
        value: ""
      - key: GEMINI_API_KEY
        value: ""

  # ── Lasso → Google Sheet daily sync ────────────────────────────────────
  # Runs every day at 22:00 UTC = 00:00 CEST (Italy time during DST)
  # Pulls cart abandoners from Lasso, dedupes by Session ID, auto-assigns to
  # Caller 1 / Caller 2 (round-robin balanced), pushes only NEW rows to the sheet.
  # Requires env vars: LASSO_EMAIL, LASSO_PASSWORD, GOOGLE_SHEETS_CREDENTIALS_JSON
  - type: cron
    name: lasso-sheet-sync
    runtime: node
    plan: starter
    schedule: "0 22 * * *"
    # NOTE: Cannot use --with-deps because Render's build user lacks sudo.
    # Render's standard Ubuntu base ships most Chromium libs already.
    buildCommand: npm install && npx playwright install chromium
    startCommand: node server/scripts/sync-lasso.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: LASSO_EMAIL
        sync: false
      - key: LASSO_PASSWORD
        sync: false
      - key: GOOGLE_SHEETS_CREDENTIALS_JSON
        sync: false
      - key: LASSO_SHEET_ID
        value: "1bv_tMbizihBeGpd-uxUPMlm0OHUL3VnRKYnExPjsNAo"
      - key: SLACK_WEBHOOK_URL
        sync: false

  # Daily preview-repair sweep — the safety-net layer of the broken-previews
  # forever-fix. Phase 1 closed every known ingress leak in staticsGeneration.js
  # (see tasks/BROKEN-PREVIEWS-FOREVER-FIX.md). If a future ingress regression
  # slips through, this cron sweeps the DB within 24h — sweep hits
  # /repair-volatile-urls (fbcdn/kie.ai/tempfile rescue) and /repair-thumbnails
  # (launched-ad Meta URL refresh). Uses CRON_SECRET for auth bypass.
  - type: cron
    name: preview-repair-sweep
    runtime: node
    plan: starter
    schedule: "0 3 * * *"   # 03:00 UTC daily
    buildCommand: npm install
    startCommand: node server/scripts/repair-preview-sweep.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER_EXTERNAL_URL
        value: "https://mineblock-dashboard.onrender.com"
      - key: CRON_SECRET
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
