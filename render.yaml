databases:
  - name: mineblock-db
    plan: basic_256mb
    databaseName: mineblock
    user: mineblock_user

services:
  - type: web
    name: mineblock-admin
    runtime: node
    plan: free
    buildCommand: npm install && cd client && npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mineblock-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://mineblock-dashboard.onrender.com
      - key: REDIS_URL
        value: ""
      - key: ANTHROPIC_API_KEY
        value: ""
      - key: GEMINI_API_KEY
        value: ""
