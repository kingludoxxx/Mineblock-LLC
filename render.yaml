databases:
  - name: mineblock-db
    plan: free
    databaseName: mineblock
    user: mineblock_user

services:
  - type: web
    name: mineblock-admin
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mineblock-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://mineblock-admin.onrender.com
